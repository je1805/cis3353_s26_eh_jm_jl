<!--
  =============================================================================
  Wazuh Agent Configuration for Jokopi Coffee Shop Container
  CIS 3353 Security Lab
  =============================================================================
  This agent monitors:
  - Nginx access and error logs (web attack detection)
  - Authentication logs (brute-force detection)
  - File integrity (FIM) on critical directories
  - System logs
  =============================================================================
-->
<ossec_config>

  <!-- Manager connection -->
  <client>
    <server>
      <address>10.10.0.10</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <enrollment>
      <enabled>yes</enabled>
      <manager_address>10.10.0.10</manager_address>
      <port>1515</port>
      <agent_name>jokopi-coffeeshop</agent_name>
      <groups>webservers,coffeeshop</groups>
    </enrollment>
    <config-profile>ubuntu, ubuntu22, ubuntu22.04</config-profile>
    <crypto_method>aes</crypto_method>
  </client>

  <!-- Log monitoring - Nginx access logs -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx/access.log</location>
  </localfile>

  <!-- Log monitoring - Nginx error logs -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx/error.log</location>
  </localfile>

  <!-- Log monitoring - Custom authentication log -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx/auth.log</location>
  </localfile>

  <!-- Log monitoring - System auth -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- Log monitoring - Syslog -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- =========================================================================
       FILE INTEGRITY MONITORING (FIM)
       =========================================================================
       Monitors critical files for unauthorized changes.
       This demonstrates Module 8: Infrastructure Threats & Security Monitoring
       ========================================================================= -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>120</frequency>
    <scan_on_start>yes</scan_on_start>

    <!-- Monitor web application root -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/var/www/html</directories>

    <!-- Monitor Nginx configuration -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/nginx</directories>

    <!-- Monitor critical system files -->
    <directories check_all="yes" realtime="yes">/etc/passwd</directories>
    <directories check_all="yes" realtime="yes">/etc/shadow</directories>
    <directories check_all="yes" realtime="yes">/etc/hosts</directories>

    <!-- Monitor PHP configuration -->
    <directories check_all="yes" realtime="yes">/etc/php</directories>

    <!-- Monitor the vulnerable database -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/var/www/data</directories>

    <!-- Ignore frequently changing files -->
    <ignore>/var/log</ignore>
    <ignore type="sregex">.log$</ignore>
  </syscheck>

  <!-- Rootcheck -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <frequency>7200</frequency>
  </rootcheck>

  <!-- Vulnerability detection -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <packages>yes</packages>
    <os>yes</os>
    <hotfixes>yes</hotfixes>
    <ports all="no">yes</ports>
    <processes>yes</processes>
  </wodle>

  <!-- Active response configuration -->
  <active-response>
    <disabled>no</disabled>
  </active-response>

  <!-- Buffer settings -->
  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

</ossec_config>
