# =============================================================================
# Nginx Configuration for Jokopi Coffee Shop
# INTENTIONALLY VULNERABLE - DO NOT USE IN PRODUCTION
# =============================================================================
# Vulnerabilities included for Security+ demonstration:
#   1. Server version exposure (server_tokens on)
#   2. Directory listing enabled (autoindex on)
#   3. No rate limiting on any endpoints
#   4. Verbose error pages
#   5. No security headers (CSP, X-Frame-Options, etc.)
#   6. PHP errors displayed to users
#   7. Database file accessible from web root
# =============================================================================

server {
    listen 80 default_server;
    server_name jokopi.local;

    # VULNERABILITY: Expose server version information
    server_tokens on;

    root /var/www/html;
    index index.html index.php;

    # Access log for Wazuh monitoring
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log debug;

    # Main React application
    location / {
        try_files $uri $uri/ /index.html;
        # VULNERABILITY: Directory listing enabled
        autoindex on;
    }

    # Vulnerable PHP API endpoints
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # VULNERABILITY: Display PHP errors
        fastcgi_param PHP_VALUE "display_errors=1";
    }

    # VULNERABILITY: Database file accessible (data exfiltration risk)
    location /data/ {
        alias /var/www/data/;
        autoindex on;
    }

    # VULNERABILITY: Server status page exposed
    location /server-status {
        stub_status on;
        # No access restriction
    }

    # VULNERABILITY: No security headers
    # Missing: Content-Security-Policy, X-Frame-Options,
    #          X-Content-Type-Options, Strict-Transport-Security

    # VULNERABILITY: Permissive CORS
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "*" always;

    # Error pages with verbose information
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/html;
        internal;
    }
}
