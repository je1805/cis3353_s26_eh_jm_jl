# =============================================================================
# Wazuh Dashboard - CIS 3353 Lab Configuration
# =============================================================================
# Classroom-lab override for the stock Wazuh dashboard config. Paired with
# opensearch-indexer.yml (security plugin disabled), so the dashboard talks
# to the indexer over plain HTTP with no authentication.
#
# Do NOT use this outside a fully isolated lab network.
# =============================================================================

# --- Dashboard HTTPS listener (port 5601) --------------------------------
# Keep the dashboard's own TLS on so browsers reach it at https://.../5601.
# Self-signed cert generated by scripts/setup/generate-certs.sh.
server.host: "0.0.0.0"
server.port: 5601
server.ssl.enabled: true
server.ssl.certificate: "/etc/wazuh-dashboard/certs/dashboard.pem"
server.ssl.key: "/etc/wazuh-dashboard/certs/dashboard-key.pem"

# --- Upstream indexer connection -----------------------------------------
# The indexer runs with plugins.security.disabled=true for the lab, so the
# dashboard speaks plain HTTP and doesn't need upstream credentials.
opensearch.hosts: ["http://10.10.0.12:9200"]
opensearch.ssl.verificationMode: none

# --- Dashboard security plugin: REMOVED from the image -------------------
# The securityDashboards plugin was calling /_plugins/_security/authinfo on
# the indexer on every login, but the indexer runs with
# plugins.security.disabled=true, so that endpoint doesn't exist and every
# login failed with 401:
#   "no handler found for uri [/_plugins/_security/authinfo] and method [GET]"
#
# We tried `opensearch_security.disabled: true` here — the Wazuh fork of
# the plugin has a strict config schema and rejects any key it doesn't
# recognize, so the dashboard fatal-exited with:
#   ValidationError: [config validation of [opensearch_security].disabled]:
#   definition for this key is missing
#
# Final fix: physically remove the securityDashboards plugin from the
# dashboard image via a derived Dockerfile. That eliminates both the
# unwanted auth calls and the config-schema tripwire in one move. The
# Wazuh UI plugin (`wazuh`) is separate and stays in place.
#
# Because the plugin is gone, ALL `opensearch_security.*` keys are now
# invalid here — they would be rejected the same way the `.disabled` key
# was. So none of them appear below.

# --- Wazuh App defaults --------------------------------------------------
uiSettings.overrides.defaultRoute: "/app/wz-home"
