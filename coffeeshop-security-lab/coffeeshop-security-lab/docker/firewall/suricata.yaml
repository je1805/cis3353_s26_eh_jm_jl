# =============================================================================
# Suricata IDS Configuration - Minimal for CIS 3353 Lab
# =============================================================================
%YAML 1.1
---

vars:
  address-groups:
    HOME_NET: "[10.10.0.0/24]"
    EXTERNAL_NET: "!$HOME_NET"
    HTTP_SERVERS: "[10.10.0.20]"
  port-groups:
    HTTP_PORTS: "80"
    SHELLCODE_PORTS: "!80"

default-log-dir: /var/log/suricata/

outputs:
  - eve-log:
      enabled: yes
      filetype: regular
      filename: eve.json
      types:
        - alert
        - http
        - dns
        - tls
        - stats:
            enabled: yes
            interval: 30

af-packet:
  - interface: eth0
    cluster-id: 99
    cluster-type: cluster_flow
    defrag: yes

app-layer:
  protocols:
    http:
      enabled: yes
    tls:
      enabled: yes
    dns:
      enabled: yes

default-rule-path: /var/lib/suricata/rules/
rule-files:
  - suricata.rules
