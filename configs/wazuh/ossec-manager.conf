<!--
  =============================================================================
  Wazuh Manager Configuration - CIS 3353 Security Lab
  =============================================================================
-->
<ossec_config>

  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>yes</logall>
    <logall_json>yes</logall_json>
    <email_notification>no</email_notification>
  </global>

  <!-- =========================================================================
       Agent enrollment - CIS 3353 Lab Configuration
       =========================================================================
       use_password is intentionally NO. With use_password=yes, wazuh-authd
       generates a random password on first start if /var/ossec/etc/authd.pass
       doesn't exist on the manager — and our agent ships with its own
       authd.pass (seeded from WAZUH_REGISTRATION_PASSWORD in .env at build
       time) that the manager has never seen. Every enrollment then fails
       with "Invalid password (from manager)" and the agent stays orphaned.

       Rather than try to keep the two passwords in sync across rebuilds,
       we disable enrollment auth entirely — same pattern as the indexer
       security plugin (disabled) and the dashboard securityDashboards
       plugin (removed). This stack is lab-only; do not run it on a
       network where someone uninvited could reach port 1515.
       ========================================================================= -->
  <auth>
    <disabled>no</disabled>
    <port>1515</port>
    <use_source_ip>no</use_source_ip>
    <purge>yes</purge>
    <use_password>no</use_password>
  </auth>

  <!-- Remote connections from agents -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!-- Alerts configuration -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!-- Rules and decoders -->
  <ruleset>
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <rule_exclude>0215-policy_rules.xml</rule_exclude>
    <list>etc/lists/audit-keys</list>
    <list>etc/lists/amazon/aws-eventnames</list>
    <list>etc/lists/security-eventchannel</list>
    <!-- Custom rules and decoders -->
    <decoder_dir>etc/decoders</decoder_dir>
    <rule_dir>etc/rules</rule_dir>
  </ruleset>

  <!-- =========================================================================
       ACTIVE RESPONSE CONFIGURATION
       =========================================================================
       Trigger IP blocks on the firewall when severe threats are detected.
       This implements the Wazuh -> pfSense automated defense pipeline.
       ========================================================================= -->

  <!-- Command: Block IP on the firewall container -->
  <command>
    <name>block-ip-firewall</name>
    <executable>block-ip-firewall.sh</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!-- Trigger: Block on severe brute-force (rule 100300) -->
  <active-response>
    <command>block-ip-firewall</command>
    <location>server</location>
    <rules_id>100300</rules_id>
    <timeout>3600</timeout>
  </active-response>

  <!-- Trigger: Block on automated SQLi tool (rule 100301) -->
  <active-response>
    <command>block-ip-firewall</command>
    <location>server</location>
    <rules_id>100301</rules_id>
    <timeout>7200</timeout>
  </active-response>

  <!-- Trigger: Block on SYN flood (rule 100302) -->
  <active-response>
    <command>block-ip-firewall</command>
    <location>server</location>
    <rules_id>100302</rules_id>
    <timeout>1800</timeout>
  </active-response>

  <!-- Trigger: Block on database exfiltration (rule 100303) -->
  <active-response>
    <command>block-ip-firewall</command>
    <location>server</location>
    <rules_id>100303</rules_id>
    <timeout>86400</timeout>
  </active-response>

  <!-- Vulnerability detection -->
  <vulnerability-detection>
    <enabled>yes</enabled>
    <index-status>yes</index-status>
    <feed-update-interval>60m</feed-update-interval>
  </vulnerability-detection>

  <!-- Indexer connection -->
  <indexer>
    <enabled>yes</enabled>
    <hosts>
      <host>https://10.10.0.12:9200</host>
    </hosts>
    <ssl>
      <certificate_authorities>
        <ca>/etc/ssl/root-ca.pem</ca>
      </certificate_authorities>
      <certificate>/etc/ssl/filebeat.pem</certificate>
      <key>/etc/ssl/filebeat-key.pem</key>
    </ssl>
  </indexer>

  <!-- Log collection from firewall container (via network) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/ossec/logs/firewall/*.log</location>
  </localfile>

</ossec_config>
